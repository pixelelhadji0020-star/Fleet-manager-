{% extends 'base.html' %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:32px 16px">
  <div style="width:100%;max-width:400px" class="fi-anim">
    <div style="text-align:center;margin-bottom:28px">
      <div style="width:52px;height:52px;background:linear-gradient(135deg,var(--gold) 0%,var(--gold-h) 100%);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:'DM Mono',monospace;font-size:18px;color:#0e1117;font-weight:800;box-shadow:var(--sh-gold)">FM</div>
      <h1 style="font-size:24px;font-weight:800;letter-spacing:-.04em;margin-bottom:4px">Connexion</h1>
      <p style="color:var(--txt-2);font-size:13.5px">Accédez à votre espace Fleet Manager</p>
    </div>
    <div class="card" style="border-radius:var(--r-lg)">
      <form method="post">
        <div class="fg">
          <label class="flb">Adresse email</label>
          <input class="fi" type="email" name="email" required placeholder="vous@exemple.fr" autofocus>
        </div>
        <div class="fg">
          <label class="flb">Mot de passe</label>
          <input class="fi" type="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center;font-size:15px;padding:13px;margin-top:4px;border-radius:var(--r-sm)">
          Se connecter
        </button>
      </form>
      <div style="text-align:center;margin-top:18px;font-size:13px;color:var(--txt-2)">
        Pas encore de compte ? <a href="/inscription" style="color:var(--gold);font-weight:700">Créer un compte</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
